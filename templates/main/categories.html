{% extends 'base.html' %}
{% block content %}

<h1 class="title">ТУМБИ</h1>

<div class="categories">
    {% for category in categories %}
        <div class="cat">{{ category.name }}</div>
    {% endfor %}
</div>

<div class="products">
    {% for tumb in tumbs %}
        <div class="product">
            <a href="{% url 'tumb_detail' tumb.id %}">
                <img src="{{ tumb.image.url }}" alt="{{ tumb.title }}">
                <p>{{ tumb.title }}</p>
            </a>
        </div>
    {% endfor %}
</div>

{% endblock %}
